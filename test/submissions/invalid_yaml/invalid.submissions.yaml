# do not use **
"**/nested_wa.py":
  required: [WA]
---
# do not use [a-z]
"[a-z]":
  required: [WA]
---
# do not nest {}
"{{secret}}":
  required: [WA]
---
# invalid verdict
accepted:
  required: [MLE]
---
# score range must be ascending.
partial:
  score: [100, 0]
---
# score must be a number, not a string.
partial:
  score: "10"
